[build]
  command = "cd backend && npm install && cd ../frontend && npm install && npm run build"
  publish = "frontend/dist"
  functions = "backend/functions"

[build.environment]
  NODE_VERSION = "22"
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"
  PUPPETEER_SKIP_DOWNLOAD = "1"

[functions]
  node_bundler = "esbuild"
  external_node_modules = [
    "@sparticuz/chromium",
    "playwright",
    "playwright-core",
    "playwright-extra",
    "puppeteer-extra-plugin-stealth",
    "mysql2"
  ]

# /api/rates — reads from Netlify Blobs instantly (all 7 providers)
# Falls back to 3 fetch-based providers if Blobs not yet populated
[functions."api"]
  timeout = 26

# Scheduled background function — scrapes all 7 providers every 30 min
# Background timeout = 15 minutes (no issue for browser scrapers)
# Saves results to Netlify Blobs so /api/rates can serve all 7 instantly
[functions."scrape"]
  schedule = "*/30 * * * *"

# All /api/* requests → serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# SPA fallback — must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
